name: momentum
description: A polished, privacy-first task and habit tracker for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  hive_ce_flutter: ^2.3.4
  intl: ^0.20.2
  json_annotation: ^4.12.0
  riverpod_annotation: ^4.0.3

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  freezed: ^3.2.5
  go_router_builder: ^4.3.0
  json_serializable: 6.14.0
  riverpod_generator: ^4.0.4

flutter:
  generate: true
  uses-material-design: true
